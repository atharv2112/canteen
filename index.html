<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Multi Canteen</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 color:white;
 background:
 linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)),
 url("https://images.unsplash.com/photo-1498654896293-37aacf113fd9");
 background-size:cover;
 background-position:center;
 background-attachment:fixed;
}

#loginBox{
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 flex-direction:column;
}

input,select,textarea{
 padding:10px;
 margin:8px auto;
 border-radius:10px;
 border:none;
 display:block;
 width:250px;
 max-width:90%;
}

nav{text-align:center;margin-top:10px}
nav button{
 margin:5px;
 padding:10px;
 border:none;
 background:#6366f1;
 color:white;
 border-radius:10px;
 cursor:pointer;
}

section{display:none;padding:20px}

.dashboard{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:15px;
}

.glass,.highlight,.warning{
 backdrop-filter:blur(10px);
 box-shadow:0 4px 20px rgba(0,0,0,0.5);
 padding:15px;
 border-radius:15px;
}

.glass{background:rgba(30,41,59,0.7)}
.highlight{background:rgba(34,197,94,0.7)}
.warning{background:rgba(239,68,68,0.7)}

.menu{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:15px;
}

.card{
 background:rgba(30,41,59,0.8);
 padding:10px;
 border-radius:15px;
 text-align:center;
}

.card img{
 width:100%;
 height:140px;
 object-fit:cover;
 border-radius:10px;
}

/* PAYMENT MODAL */
#paymentFormModal{
 display:none;
 position:fixed;
 inset:0;
 background:rgba(0,0,0,0.8);
 justify-content:center;
 align-items:center;
}

.modal{
 background:#111827;
 padding:25px;
 border-radius:15px;
 text-align:center;
 width:300px;
}
</style>
</head>

<body>

<div id="loginBox">
<h2>Login</h2>
<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="doLogin()">Login</button>
</div>

<div id="mainApp" style="display:none;">

<header style="text-align:center;padding:20px;">
<h1 id="title">🍽️ Select Canteen</h1>

<select id="canteenSelect" onchange="setCanteen()">
<option value="">Select Canteen</option>
<option>Vaishavi</option>
<option>Sweet n Treat</option>
<option>Hangers Point</option>
</select>
</header>

<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('menu')">Menu</button>
<button id="cartBtn" onclick="showSection('cart')">Cart (<span id="count">0</span>)</button>
<button id="billBtn" onclick="showSection('bill')">Bill</button>
<button id="adminBtn" onclick="showSection('admin')" style="display:none;">Admin</button>
<button onclick="logout()">Logout</button>
</nav>

<section id="home">
<div class="dashboard">
<div class="glass"><h3>⏰ Busy Time</h3><p id="busyTime">--</p></div>
<div class="warning"><h3>🔥 Busy Level</h3><p id="busyLevel">--</p></div>
<div class="highlight"><h3>🍔 Most Selling Food</h3><p id="topFood">--</p></div>
<div class="glass"><h3>🔮 Prediction</h3><p id="prediction">--</p></div>
</div>
</section>

<section id="menu">
<h2>Menu</h2>
<div id="menuList" class="menu"></div>
</section>

<section id="cart">
<h2>Cart</h2>
<div id="cartItems"></div>
<h3>Total ₹<span id="total">0</span></h3>
<button onclick="pay()">Pay</button>
</section>

<!-- ✅ UPDATED BILL -->
<section id="bill">
<h2>Bill</h2>
<div id="billContent"></div>
<button onclick="downloadBill()">Download Bill</button>
</section>

<section id="admin">
<h3>Orders</h3>
<div id="orders"></div>
</section>

</div>

<!-- PAYMENT -->
<div id="paymentFormModal">
<div class="modal">
<h3>Complete Your Order</h3>

<input id="pName" placeholder="Enter Name">
<input id="pMobile" placeholder="Enter Mobile">

<select id="pMethod">
<option value="">Select Payment</option>
<option value="Online">Online</option>
<option value="Cash">Cash</option>
</select>

<button onclick="submitPayment()">Continue</button>

<div id="onlineBox" style="display:none;margin-top:15px;">
<p>Scan QR or pay using UPI</p>
<img width="150"
src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay">
<p><b>UPI ID:</b> canteen@upi</p>
<button onclick="confirmOnline()">Confirm Payment</button>
</div>

</div>
</div>

<script>

const usersDB=[
{username:"vedanti",password:"vedanti01",role:"user"},
{username:"ishwari",password:"ishwari16",role:"admin"}
];

let user=null,cart=[],currentCanteen="",lastOrder=null,tempUser={};

function doLogin(){
 let u=loginUsername.value.trim();
 let p=loginPassword.value.trim();

 let found=usersDB.find(x=>x.username===u && x.password===p);
 if(!found){alert("Wrong login ❌");return;}

 user=found;
 loginBox.style.display="none";
 mainApp.style.display="block";

 if(user.role==="admin"){
  adminBtn.style.display="inline-block";
  cartBtn.style.display="none";
  billBtn.style.display="none";
 }

 showSection("home");
}

function logout(){location.reload();}

function showSection(id){
 document.querySelectorAll("section").forEach(s=>s.style.display="none");
 if(user.role==="user" && id==="admin")return;
 document.getElementById(id).style.display="block";

 if(id==="cart")renderCart();
 if(id==="bill")renderBill();
 if(id==="admin")renderAdmin();
}

const foods=[
{name:"Burger",price:40,img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"Pizza",price:60,img:"https://images.unsplash.com/photo-1601924582975-7e67069c62b6"},
// NEW ITEMS 🚀
{name:"Vada Pav",price:20,img:"https://images.unsplash.com/photo-1604908176997-125f25cc6b54"},
{name:"Sandwich",price:30,img:"https://images.unsplash.com/photo-1554433607-66b5efe9d304"},
{name:"Cold Coffee",price:35,img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"},
{name:"Maggi",price:25,img:"https://images.unsplash.com/photo-1604908177522-4325c70bfa36"},
{name:"Pasta",price:50,img:"https://images.unsplash.com/photo-1525755662778-989d0524087e"},
{name:"French Fries",price:40,img:"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"},
{name:"Dosa",price:45,img:"https://images.unsplash.com/photo-1589301760014-d929f3979dbc"},
{name:"Idli",price:30,img:"https://images.unsplash.com/photo-1589302168068-964664d93dc0"},
{name:"Paneer Roll",price:55,img:"https://images.unsplash.com/photo-1604908176997-125f25cc6b54"},
{name:"Chocolate Shake",price:45,img:"https://images.unsplash.com/photo-1572490122747-3968b75cc699"}

];

foods.forEach((f,i)=>{
 menuList.innerHTML+=`<div class="card"><img src="${f.img}"><h3>${f.name}</h3><p>₹${f.price}</p><button onclick="add(${i})">Add</button></div>`;
});

function add(i){
 if(!currentCanteen){alert("Select canteen ❌");return;}
 cart.push(foods[i]);
 count.innerText=cart.length;
}

function renderCart(){
 let t=0,html="";
 cart.forEach(i=>{t+=i.price;html+=`<div class="glass">${i.name} ₹${i.price}</div>`;});
 cartItems.innerHTML=html;
 total.innerText=t;
}

function pay(){
 if(cart.length===0)return;
 paymentFormModal.style.display="flex";
}

function submitPayment(){
 let name=pName.value;
 let mobile=pMobile.value;
 let method=pMethod.value;

 if(!name || !mobile || !method){
  alert("Fill all details ❌");
  return;
 }

 tempUser={name,mobile};

 if(method==="Online"){
  onlineBox.style.display="block";
 }else{
  doneOrder("Cash");
 }
}

function confirmOnline(){
 onlineBox.innerHTML="Processing...";
 setTimeout(()=>doneOrder("Online"),2000);
}

function doneOrder(mode){
 lastOrder={
  name:tempUser.name,
  mobile:tempUser.mobile,
  payment:mode,
  canteen:currentCanteen,
  time:new Date().toLocaleString(),
  items:[...cart],
  total:cart.reduce((a,b)=>a+b.price,0)
 };

 let data=JSON.parse(localStorage.getItem("orders"))||[];
 data.push(lastOrder);
 localStorage.setItem("orders",JSON.stringify(data));

 cart=[];
 count.innerText=0;

 paymentFormModal.style.display="none";

 alert("Order Placed Successfully ✅");

 showSection("bill");
 renderBill();
}

function renderBill(){
 billContent.innerHTML=`
 Name: ${lastOrder.name}<br>
 Mobile: ${lastOrder.mobile}<br>
 Time: ${lastOrder.time}<br>
 Payment: ${lastOrder.payment}<br><br>
 ${lastOrder.items.map(i=>i.name+" ₹"+i.price).join("<br>")}
 <br><br><b>Total ₹${lastOrder.total}</b>
 `;
}

/* 🔥 DOWNLOAD BILL */
function downloadBill(){
 let w=window.open("");
 w.document.write(`
 <h2 style="text-align:center;">Canteen Receipt</h2>
 <hr>
 Name: ${lastOrder.name}<br>
 Mobile: ${lastOrder.mobile}<br>
 Time: ${lastOrder.time}<br>
 Payment: ${lastOrder.payment}<br><br>
 ${lastOrder.items.map(i=>i.name+" ₹"+i.price).join("<br>")}
 <hr>
 <h3>Total ₹${lastOrder.total}</h3>
 `);
 w.print();
}

function renderAdmin(){
 let data=JSON.parse(localStorage.getItem("orders"))||[];
 orders.innerHTML="";
 data.forEach(o=>{
  orders.innerHTML+=`<div class="glass">${o.name} (${o.mobile}) - ${o.payment} - ₹${o.total}</div>`;
 });
}

function setCanteen(){
 currentCanteen=canteenSelect.value;
 title.innerText="🍽️ "+currentCanteen+" Canteen";
}

</script>

</body>
</html>
