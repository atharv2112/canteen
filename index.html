<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Multi Canteen</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
header{text-align:center;padding:20px}
select{padding:10px;border-radius:10px}

nav{text-align:center}
nav button{
 margin:5px;padding:10px;border:none;
 background:#6366f1;color:white;border-radius:10px;
 cursor:pointer;
}

section{display:none;padding:20px}
.active{display:block}

.glass{background:#1e293b;padding:15px;border-radius:15px;margin:10px 0}

.dashboard{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:15px;
}

.highlight{background:#22c55e;padding:15px;border-radius:15px}
.warning{background:#ef4444;padding:15px;border-radius:15px}

.menu{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:15px;
}

.card{
 background:#1e293b;border-radius:15px;text-align:center;padding:10px;
}

.card img{
 width:100%;height:140px;object-fit:cover;border-radius:10px;
}

.add{background:#22c55e;border:none;color:white;padding:6px;border-radius:8px}
.remove{background:red;border:none;color:white;padding:6px;border-radius:8px}

#paymentModal{
 position:fixed;inset:0;background:rgba(0,0,0,.7);
 display:none;justify-content:center;align-items:center;
}

.modal{background:#111827;padding:20px;border-radius:15px;text-align:center}
#qr{display:none;margin-top:10px}
</style>
</head>

<body>

<header>
<h1 id="title">🍽️ Vaishavi Canteen</h1>
<select id="canteenSelect">
<option>Vaishavi</option>
<option>Sweet n Treat</option>
<option>Hangers Point</option>
</select>
</header>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('menu')">Menu</button>
<button onclick="show('cart')">Cart (<span id="count">0</span>)</button>
<button onclick="show('bill')">Bill</button>
<button onclick="show('admin')">Admin</button>
</nav>

<!-- HOME -->
<section id="home" class="active">
<div class="dashboard">

<div class="glass">
<h3>⏰ Busy Time</h3>
<p id="busyTime">--</p>
</div>

<div class="warning">
<h3>🔥 Busy Level</h3>
<p id="busyLevel">--</p>
</div>

<div class="highlight">
<h3>🍔 Most Selling Food</h3>
<p id="topFood">--</p>
</div>

<div class="glass">
<h3>🔮 Prediction</h3>
<p id="prediction">--</p>
</div>

</div>
</section>

<!-- MENU -->
<section id="menu">
<h2>Menu</h2>
<div id="menuList" class="menu"></div>
</section>

<!-- CART -->
<section id="cart">
<h2>Cart</h2>
<div id="cartItems"></div>
<h3>Total ₹<span id="total">0</span></h3>
<button onclick="payOpen()">Pay</button>
</section>

<!-- BILL -->
<section id="bill">
<h2>Bill</h2>
<p id="billName"></p>
<p>Date: <span id="time"></span></p>
<p>Mode: <span id="mode"></span></p>
<div id="billItems"></div>
<h3>Total ₹<span id="billTotal"></span></h3>
</section>

<!-- ADMIN -->
<section id="admin">
<h2>Admin</h2>
<div id="orders"></div>
</section>

<!-- PAYMENT -->
<div id="paymentModal">
<div class="modal">
<h3>Payment</h3>
<button onclick="pay('UPI')">UPI</button>
<button onclick="pay('Cash')">Cash</button>
<img id="qr" width="150"
src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay">
<p id="payText"></p>
</div>
</div>

<script>

/* GLOBAL */
let currentCanteen="Vaishavi";
let cart=[],ordersData=[],lastOrder=null;

/* KEY */
function key(n){return currentCanteen+"_"+n}

/* LOAD */
function load(){
 cart=JSON.parse(localStorage.getItem(key("cart")))||[];
 ordersData=JSON.parse(localStorage.getItem(key("orders")))||[];
 lastOrder=JSON.parse(localStorage.getItem(key("last")))||null;
 update();
 renderCart();
 calculateInsights();
}

/* SAVE */
function save(){
 localStorage.setItem(key("cart"),JSON.stringify(cart));
 localStorage.setItem(key("orders"),JSON.stringify(ordersData));
 localStorage.setItem(key("last"),JSON.stringify(lastOrder));
}

/* SWITCH */
canteenSelect.onchange=function(){
 currentCanteen=this.value;
 title.innerText="🍽️ "+currentCanteen+" Canteen";
 load();
}

/* FOOD */
const foods=[
{name:"Burger",price:40,img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"Pizza",price:60,img:"https://images.unsplash.com/photo-1601924582975-7e67069c62b6"},
{name:"Samosa",price:15,img:"https://images.unsplash.com/photo-1601050690597-df0568f70950"},
{name:"Tea",price:10,img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"},
{name:"Coffee",price:25,img:"https://images.unsplash.com/photo-1511920170033-f8396924c348"},
{name:"Rice",price:50,img:"https://images.unsplash.com/photo-1604908177522-4325c70bfa36"}
];

/* MENU */
foods.forEach((f,i)=>{
 menuList.innerHTML+=`
 <div class="card">
 <img src="${f.img}">
 <h3>${f.name}</h3>
 <p>₹${f.price}</p>
 <button class="add" onclick="add(${i})">Add</button>
 </div>`;
});

function add(i){cart.push(foods[i]);update();save();}

/* CART */
function renderCart(){
 let t=0;cartItems.innerHTML="";
 cart.forEach((item,i)=>{
  t+=item.price;
  cartItems.innerHTML+=`
  <div class="glass">
  ${item.name} ₹${item.price}
  <button class="remove" onclick="remove(${i})">X</button>
  </div>`;
 });
 total.innerText=t;
}

function remove(i){cart.splice(i,1);update();renderCart();save();}

/* PAYMENT */
function payOpen(){
 if(cart.length===0)return;
 paymentModal.style.display="flex";
 qr.style.display="none";
 payText.innerText="";
}

function pay(mode){
 payText.innerText="Processing...";
 if(mode==="UPI")qr.style.display="block";
 setTimeout(()=>done(mode),2000);
}

function done(mode){
 lastOrder={
  canteen:currentCanteen,
  time:new Date().toLocaleString(),
  hour:new Date().getHours(),
  mode,
  items:[...cart],
  total:cart.reduce((a,b)=>a+b.price,0)
 };
 ordersData.push(lastOrder);

 cart=[];
 update();
 save();

 paymentModal.style.display="none";
 show("bill");
}

/* BILL */
function renderBill(){
 if(!lastOrder)return;
 billName.innerText=lastOrder.canteen;
 time.innerText=lastOrder.time;
 mode.innerText=lastOrder.mode;
 billTotal.innerText=lastOrder.total;

 billItems.innerHTML="";
 lastOrder.items.forEach(i=>{
  billItems.innerHTML+=`${i.name} ₹${i.price}<br>`;
 });
}

/* ADMIN */
function renderAdmin(){
 orders.innerHTML="";
 ordersData.forEach(o=>{
  orders.innerHTML+=`
  <div class="glass">
  ${o.time}<br>${o.mode}<br>Total ₹${o.total}
  </div>`;
 });
}

/* 📊 INSIGHTS */
function calculateInsights(){

 if(ordersData.length===0){
  busyTime.innerText="No data yet";
  topFood.innerText="No data";
  prediction.innerText="Order to generate data";
  busyLevel.innerText="--";
  return;
 }

 let foodCount={},timeCount={};

 ordersData.forEach(o=>{
  let slot=o.hour<12?"Morning":o.hour<17?"Afternoon":"Evening";
  timeCount[slot]=(timeCount[slot]||0)+1;

  o.items.forEach(i=>{
   foodCount[i.name]=(foodCount[i.name]||0)+1;
  });
 });

 let top=Object.keys(foodCount).reduce((a,b)=>foodCount[a]>foodCount[b]?a:b);
 let busy=Object.keys(timeCount).reduce((a,b)=>timeCount[a]>timeCount[b]?a:b);

 busyTime.innerText=busy;
 topFood.innerText=top;

 busyLevel.innerText=timeCount[busy]>5?"HIGH 🔥":"MEDIUM";

 prediction.innerText=`Try ${top} during ${busy}`;
}

/* NAV */
function show(id){
 document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");

 if(id==="cart")renderCart();
 if(id==="bill")renderBill();
 if(id==="admin")renderAdmin();
}

/* COUNT */
function update(){count.innerText=cart.length}

/* INIT */
load();

</script>

</body>
</html>
